version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: secondbrain_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: secondbrain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secondbrain_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@db:5432/secondbrain

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: secondbrain_analytics
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-strongpassword}@db:5432/secondbrain
    ports:
      - "8000:8000"

volumes:
  postgres_data:
