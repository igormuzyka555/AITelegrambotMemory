<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Второй Мозг — Аналитика</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 16px;
            padding: 48px;
            width: 360px;
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; color: #fff; }
        p { color: #888; font-size: 14px; margin-bottom: 32px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: #7c6aff; }
        button {
            width: 100%;
            padding: 12px;
            background: #7c6aff;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #6a58ee; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🧠</div>
        <h1>Второй Мозг</h1>
        <p>Панель аналитики</p>
        <form action="/analytics" method="get">
            <input type="password" name="password" placeholder="Введи пароль" autofocus>
            <button type="submit">Войти →</button>
        </form>
    </div>
</body>
</html>
